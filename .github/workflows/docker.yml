name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose.yml'
      - '.github/workflows/docker.yml'
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 0' # Weekly build

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - dockerfile: ./frontend/Dockerfile
            image: ecommerce-frontend
            context: ./frontend
          - dockerfile: ./backend/Dockerfile
            image: ecommerce-backend
            context: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v4
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.meta.outputs.version }}

  validate-images:
    name: Validate Docker Images
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Validate frontend image
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/ecommerce-frontend:latest
          docker inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/ecommerce-frontend:latest

      - name: Validate backend image
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/ecommerce-backend:latest
          docker inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/ecommerce-backend:latest

      - name: Test docker-compose with pushed images
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: |
          # Update docker-compose.yml to use latest images
          sed -i 's|e-commercedevops-frontend:latest|'${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}'/ecommerce-frontend:latest|g' docker-compose.yml
          sed -i 's|e-commercedevops-backend:latest|'${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}'/ecommerce-backend:latest|g' docker-compose.yml
          echo "Updated docker-compose.yml with pushed image tags"

      - name: Install docker-compose
        run: |
          sudo curl -L "https://github.com/docker/compose/releases/download/v2.20.2/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose
          docker-compose version

      - name: Validate docker-compose file
        run: docker-compose config

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [build-and-push, validate-images]
    if: always()

    steps:
      - name: Check deployment status
        run: |
          if [ "${{ needs.build-and-push.result }}" = "success" ] && \
             [ "${{ needs.validate-images.result }}" = "success" ]; then
            echo "✅ Docker images built and pushed successfully"
            echo "Frontend: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/ecommerce-frontend:latest"
            echo "Backend: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/ecommerce-backend:latest"
          else
            echo "❌ Docker build or validation failed"
            exit 1
          fi

      - name: Post deployment comment (on PR)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🐳 Docker images built successfully!\n- Frontend: `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/ecommerce-frontend:latest`\n- Backend: `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/ecommerce-backend:latest`'
            })
